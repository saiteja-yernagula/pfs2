<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding:0; 
            margin:0;
            box-sizing:border-box;
        }
        header{
            background:black;
            color:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:30px;
        }
        ul{
            display:flex;
            gap:20px;
        }
        li{
            list-style-type:none;
        }
        li:hover{
            color:rgb(43, 187, 43);
        }


        .s1{
            display:flex;
            align-items:center;
            background:black;
            color:white;
        }
        img{
            width:100%;
            height:100%; }
        .s1>div{
            flex-basis:50%;
        }
        .btn1{
            background:green;
            padding:10px; 
            color:black;
        }
        .btn2{
            border:2px solid green;
            padding:10px;
            background:transparent;
            color:white;
        }
        .s1>div>h3{
          margin:10px 0px;  
        }
         .s1>div>p{
          margin:10px 0px;  
        }

    </style>
</head>
<body>
    <header>
        <h1>
          <span  style="color:rgb(55, 249, 55);border :2px solid rgb(50, 227, 50);padding:10px">JD</span>   JOHN DOE
        </h1>
        <ul>
            <li>About</li>
            <li>Achievements</li>
            <li>Education</li>
            <li>Projects</li>
            <li>Contact</li>
        </ul>
    </header>

    <section class="s1">
        <div>
            <h1>Hi, I'm <span style="color:green;"> John Doe</span></h1>
            <h3>I build simple and clean websites.</h3>
            <p>I am a web development student who loves turning ideas into real, working web pages.</p>
            <button class="btn1">View Projects</button>
            <button class="btn2">Download CV</button>
        </div>
        <div>
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="">
        </div>
    </section>
    
</body>
</html>
